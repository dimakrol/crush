services:
  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27117}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6479}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend/platform
    env_file:
      - ./backend/platform/.env
    # Container-network routing overrides (these win over env_file).
    # Everything else (JWT secret, round params) comes from the .env file above.
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/crash_pilot
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-5274}
    ports:
      - "${BACKEND_PORT:-4100}:4000"
    volumes:
      - ./backend/platform:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/crash-pilot
    # Browser-facing URLs: the browser reaches the backend via the published
    # host port, so these stay on localhost (not the internal service name).
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-4100}
      VITE_SOCKET_URL: http://localhost:${BACKEND_PORT:-4100}
    ports:
      - "${FRONTEND_PORT:-5274}:5174"
    volumes:
      - ./frontend/crash-pilot:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
